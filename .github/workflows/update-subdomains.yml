name: Update subdomain list

on:
  schedule:
    # Run every Monday at 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate list.html
        run: python scripts/generate_list.py

      - name: Open PR if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add list.html
          if git diff --cached --quiet; then
            echo "No changes to list.html, skipping PR."
            exit 0
          fi
          BRANCH="auto/update-subdomains-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: auto-update subdomain list"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: auto-update subdomain list" \
            --body "Subdomain liveness scan detected changes. Auto-generated by [update-subdomains](.github/workflows/update-subdomains.yml)." \
            --base master \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
